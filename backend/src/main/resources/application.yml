spring:
  application:
    name: cookyourbooks-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cookyourbooks}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

cookyourbooks:
  jwt:
    # 256-bit base64 secret — OVERRIDE in production via env var
    secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1jaGFuZ2UtaW4tcHJvZC0xMjM0NTY3OA==}
    issuer: cookyourbooks
    access-token-ttl-minutes: ${JWT_TTL_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  usda:
    api-key: ${USDA_API_KEY:DEMO_KEY}
    base-url: https://api.nal.usda.gov/fdc/v1
